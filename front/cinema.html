<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Kinoplex - Reserva</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <button onclick="window.location.href='index.html'" style="margin-bottom: 20px; background: var(--color-surface); padding: 8px 15px;">← Voltar ao Catálogo</button>
            <h1>🍿 Kinoplex</h1>
        </header>

        <div class="main-grid">
            <div class="movie-section">
                <div class="movie-header">
                    <div class="movie-poster" style="background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));">🎬</div>
                    <div class="movie-info">
                        <h2 id="movieTitle">Carregando...</h2>
                        <div class="movie-meta">
                            <div class="meta-item" id="movieDuration">⏱️ -- min</div>
                            <div class="meta-item" id="movieRating">⭐ --/10</div>
                            <div class="meta-item" id="movieGenre">🎬 --</div>
                        </div>
                        <p id="movieSynopsis" style="color: var(--color-text-secondary);">Carregando informações...</p>
                    </div>
                </div>

                <div class="controls-grid">
                    <div class="control-group">
                        <label>Cinema</label>
                        <select id="cinemaSelect" disabled></select>
                    </div>
                    <div class="control-group">
                        <label>Horário</label>
                        <select id="showtimeSelect" disabled></select>
                    </div>
                </div>

                <div class="cinema-screen">🎬 TELA KINOPLEX 🎬</div>

                <div class="legend">
                    <div class="legend-item"><div class="legend-seat available"></div><span>Livre</span></div>
                    <div class="legend-item"><div class="legend-seat selected"></div><span>Sua</span></div>
                    <div class="legend-item"><div class="legend-seat occupied"></div><span>Ocupado</span></div>
                    <div class="legend-item"><div class="legend-seat vip"></div><span>VIP</span></div>
                </div>

                <div class="seating-section" id="seatingArea"></div>
            </div>

            <div class="sidebar">
                <div class="summary-card">
                    <h3>Resumo</h3>
                    <div class="summary-item"><span>Ingressos</span><span id="ticketCount">0</span></div>
                    <div id="selectedSeatsList" style="display: none; margin: 10px 0;">
                        <div id="seatTagsContainer"></div>
                    </div>
                    <div class="summary-item"><span>Preço Unit.</span><span id="unitPrice">R$ 0,00</span></div>
                    <div class="summary-item"><span>Taxas</span><span id="taxPrice">R$ 2,50</span></div>
                    <div class="price-total">
                        <div>Total</div>
                        <div id="totalPrice">R$ 0,00</div>
                    </div>
                    <button id="confirmBtn" onclick="confirmReservation()" disabled>Confirmar</button>
                    <button onclick="clearSelection()" style="background: transparent; border: 1px solid var(--color-primary); margin-top: 10px;">Limpar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Ticket (Feedback Visual) -->
    <div id="ticketModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000;">
        <div class="ticket" style="background: var(--color-surface); padding: 25px; border-radius: 12px; border: 2px dashed #444; width: 90%; max-width: 380px;">
            <div class="ticket-header" style="text-align: center; margin-bottom: 20px; color: var(--color-primary); border-bottom: 2px dashed #444; padding-bottom: 15px;">
                <h2 style="margin: 0;">🎟️ Seu Ingresso</h2>
            </div>
            <div class="ticket-body" style="color: var(--color-text-secondary);">
                <p style="margin: 10px 0;"><strong>Código da Reserva:</strong> <span id="ticketReservaId" style="color: var(--color-text);"></span></p>
                <p style="margin: 10px 0;"><strong>Filme:</strong> <span id="ticketMovieTitle" style="color: var(--color-text);"></span></p>
                <p style="margin: 10px 0;"><strong>Assentos:</strong> <span id="ticketSeats" style="color: var(--color-text);"></span></p>
                <hr style="border-color: #333; margin: 15px 0;">
                <p style="display: flex; justify-content: space-between; margin: 10px 0;">
                    <span>Total Pago:</span>
                    <strong id="ticketTotal" style="color: var(--color-available); font-size: 1.2rem;"></strong>
                </p>
            </div>
            <button onclick="closeTicket()" style="width: 100%; margin-top: 20px;">Concluir e Voltar</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="script.js"></script>
</body>
</html>
